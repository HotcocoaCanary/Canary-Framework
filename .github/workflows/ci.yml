name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra web

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Format check (ruff)
        run: uv run ruff format --check src/ tests/

      - name: Type check (mypy strict)
        run: uv run mypy src/ tests/

      - name: Test & coverage
        run: uv run pytest --cov=src/canary_framework --cov-report=term --cov-report=xml --cov-fail-under=70

      - name: Check version consistency
        run: |
          uv run python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              p = tomllib.load(f)
          ver = p['project']['version']
          from canary_framework import __version__
          assert __version__ == ver, f'{__version__} != {ver}'
          print(f'Version {ver} OK')
          "

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
