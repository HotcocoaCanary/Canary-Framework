name: ✨ 功能请求
description: 建议新功能或改进
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: 使用场景
      description: 描述你的使用场景，你想解决什么问题？
    validations:
      required: true
  - type: textarea
    attributes:
      label: 期望方案
      description: 你期望的 API 或行为是什么样的？
    validations:
      required: true
  - type: textarea
    attributes:
      label: 备选方案
      description: 你考虑过哪些替代方案？
  - type: textarea
    attributes:
      label: 补充信息
      description: 其他相关内容
