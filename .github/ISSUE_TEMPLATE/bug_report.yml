name: 🐛 Bug 报告
description: 报告框架的 bug 或异常行为
labels: [bug]
body:
  - type: textarea
    attributes:
      label: 描述问题
      description: 请清晰描述你遇到的问题
    validations:
      required: true
  - type: textarea
    attributes:
      label: 复现步骤
      description: 提供最小复现代码
      render: python
    validations:
      required: true
  - type: textarea
    attributes:
      label: 期望行为
      description: 你期望发生什么？
    validations:
      required: true
  - type: input
    attributes:
      label: CF 版本
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    attributes:
      label: Python 版本
      placeholder: "3.12"
    validations:
      required: true
  - type: input
    attributes:
      label: 操作系统
      placeholder: "Ubuntu 22.04 / macOS 14 / Windows 11"
  - type: textarea
    attributes:
      label: 其他上下文
      description: 日志输出、截图等
