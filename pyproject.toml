[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "cf"
version = "0.1.0"
description = "Canary-Framework"
requires-python = ">=3.12"
dependencies = [
    "pydantic-settings>=2.3",
]

[project.optional-dependencies]
web = [
    "fastapi>=0.115",
    "uvicorn>=0.34",
]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.25",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]



[tool.hatch.build.targets.wheel]
packages = ["cf"]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.25",
]
