site_name: Canary Framework
site_description: Lightweight decorator-driven Python async service framework with dependency injection
site_author: 张文博 (Canary)
copyright: Copyright &copy; 2026 张文博 (Canary)

repo_url: https://github.com/HotcocoaCanary/Canary-Framework
repo_name: HotcocoaCanary/Canary-Framework
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          build: true
          default: true
        - locale: zh
          name: 中文
          build: true

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Core:
      - Services: services.md
      - Modules: modules.md
      - Routers: web.md
      - Configuration: configuration.md
      - Lifecycle: lifecycle.md
      - Dependency Injection: dependency-injection.md
  - Architecture: core.md
  - API Reference: api-reference.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/HotcocoaCanary/Canary-Framework
