# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
#
# 提示 / Tip: 运行 `uv run pre-commit autoupdate` 可将下面各 hook 的 rev
# 更新到最新版本；这里的 rev 与 pyproject.toml 的工具版本保持一致。

default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: debug-statements
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--strict]
        # 仅列出 src/ 里实际 import 的第三方库，供 mypy 解析类型。
        # Canary 基于 Starlette + Pydantic；uvicorn 是可选 [web] 依赖、
        # 不在 src/ 内 import，因此不列入。
        additional_dependencies:
          - pydantic>=2.13
          - pydantic-settings>=2.12
          - starlette>=1.3
          - pytest>=8.3
        files: ^src/
